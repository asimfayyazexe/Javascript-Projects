<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root {
            --bg: #1b1047;
            --card: #2d236d;
            --text: #fff;
            --muted: #c8c8d8;
            --success: #22c55e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
            padding: 2rem;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .user {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            background: var(--card);
            padding: 1.5rem 3rem;
            border-radius: 8px;
            transition: .3s;
        }

        .user:hover {
            transform: translateY(-5px);
        }

        img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 50%;
        }

        .info {
            display: flex;
            flex-direction: column;
            gap: .45rem;
        }

        .info p {
            color: var(--muted);
        }

        .info span {
            display: inline-block;
            width: fit-content;
            padding: .35rem .8rem;
            background: var(--success);
            border-radius: 999px;
            font-size: .8rem;
            font-weight: 600;
        }

        #refreshtBtn {
            margin-top: 2rem;
            font-size: 1.2rem;
            padding: 0.8rem 2rem;
            border-radius: 12px;
            outline: none;
            border: none;
            background-color: var(--card);
            color: var(--text);
        }
    </style>
</head>

<body>
    <div class="container">
    </div>
    <button id="refreshtBtn">Refresh</button>

    <script src="project.js"></script>
</body>

</html>
