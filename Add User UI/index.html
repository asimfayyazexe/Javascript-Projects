<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User UI</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
        background: #111;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 40px 20px;
    }

    .container {
        width: 100%;
        max-width: 1200px;
    }

    /* ---------- Form ---------- */

    .form {
        width: 420px;
        margin: 0 auto 50px;
        background: #222;
        padding: 30px;
        border-radius: 12px;
        border: 1px solid #333;
    }

    .form h1 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 34px;
    }

    .input-group {
        margin-bottom: 18px;
    }

    .input-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        color: #ddd;
    }

    input,
    textarea {
        width: 100%;
        background: #3a3a3a;
        border: none;
        border-radius: 6px;
        padding: 12px;
        color: white;
        font-size: 15px;
        outline: none;
    }

    textarea {
        resize: none;
        height: 90px;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        background: #2d2d2d;
        color: white;
        border: 1px solid #444;
        border-radius: 6px;
        cursor: pointer;
        transition: .3s;
    }

    button:hover {
        background: #444;
    }

    /* ---------- Cards ---------- */

    .card-container {
        display: flex;
        justify-content: center;
        gap: 30px;
        flex-wrap: wrap;
    }

    .card {
        width: 260px;
        background: #222;
        border: 1px solid #333;
        border-radius: 12px;
        text-align: center;
        padding: 25px 20px;
        transition: .3s;
    }

    .card:hover {
        transform: translateY(-6px);
    }

    .card img {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid #555;
        margin-bottom: 15px;
    }

    .card h2 {
        margin-bottom: 6px;
        font-size: 28px;
    }

    .card h4 {
        color: #bdbdbd;
        font-size: 15px;
        margin-bottom: 15px;
    }

    .card p {
        color: #d0d0d0;
        font-size: 14px;
        line-height: 1.6;
    }

    /* ---------- Responsive ---------- */

    @media(max-width:500px) {

        .form-box {
            width: 100%;
        }

        .card {
            width: 100%;
        }

    }
</style>

<body>

    <div class="container">

        <!-- Form -->
        <form class="form">

            <h1>Add User</h1>

            <div class="input-group">
                <label>Name</label>
                <input id="name" type="text" placeholder="Asim">
            </div>

            <div class="input-group">
                <label>Role</label>
                <input id="role" type="text" placeholder="Developer">
            </div>

            <div class="input-group">
                <label>Bio</label>
                <textarea id="bio" placeholder="I love teaching and making projects"></textarea>
            </div>

            <div class="input-group">
                <label>Photo URL</label>
                <input id="photo" type="text">
            </div>

            <div class="input-group">
                <input id="submit" type="submit">
            </div>


        </form>

        <!-- Cards -->
        <div class="card-container">

        </div>

    </div>


    <script src="script.js"></script>
</body>

</html>
